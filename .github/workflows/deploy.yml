name: Deploy to AWS S3 + CloudFront

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync files to S3
        run: |
          aws s3 sync . s3://${{ vars.S3_BUCKET }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".claude/*" \
            --exclude ".DS_Store" \
            --exclude "CLAUDE.md" \
            --exclude "DEPLOYMENT.md" \
            --exclude ".gitignore"

      - name: Set cache headers for assets
        run: |
          aws s3 cp s3://${{ vars.S3_BUCKET }}/styles.css s3://${{ vars.S3_BUCKET }}/styles.css \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "text/css" \
            --metadata-directive REPLACE

          aws s3 cp s3://${{ vars.S3_BUCKET }}/form-handler.js s3://${{ vars.S3_BUCKET }}/form-handler.js \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/javascript" \
            --metadata-directive REPLACE

          aws s3 cp s3://${{ vars.S3_BUCKET }}/index.html s3://${{ vars.S3_BUCKET }}/index.html \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html" \
            --metadata-directive REPLACE

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
